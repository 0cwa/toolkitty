version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(npm)
    # These exact versions preserve the current Svelte/Vite lint and type-check stack.
    ignore:
      - dependency-name: eslint-plugin-svelte
      - dependency-name: prettier
      - dependency-name: prettier-plugin-svelte
      - dependency-name: svelte-check
      - dependency-name: typescript
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(cargo)
    groups:
      cargo-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /src-tauri/gen/android
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(android)
    groups:
      android-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
