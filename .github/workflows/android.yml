name: Android

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  ANDROID_NDK_VERSION: "29.0.13846066"
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.96.0"

jobs:
  android:
    name: Build, lint, and verify
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            src-tauri/gen/android/*.gradle*
            src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties
            src-tauri/gen/android/app/*.gradle*
            src-tauri/gen/android/buildSrc/*.gradle*

      - name: Install Android SDK and NDK
        run: |
          sdkmanager --install \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"

          android_ndk_home="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          test -x "${android_ndk_home}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objdump"
          {
            echo "ANDROID_NDK=${android_ndk_home}"
            echo "ANDROID_NDK_HOME=${android_ndk_home}"
            echo "ANDROID_NDK_ROOT=${android_ndk_home}"
            echo "NDK_HOME=${android_ndk_home}"
          } >> "${GITHUB_ENV}"

      - name: Install Rust toolchain and Android targets
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Build three-ABI debug APK
        run: >-
          npm run tauri -- android build
          --ci
          --debug
          --apk
          --target aarch64 armv7 x86_64

      - name: Run Android lint and unit tests
        working-directory: src-tauri/gen/android
        run: |
          ./gradlew --no-daemon --stacktrace \
            -PabiList=arm64-v8a,armeabi-v7a,x86_64 \
            -ParchList=arm64,arm,x86_64 \
            -PtargetList=aarch64,armv7,x86_64 \
            :app:lintUniversalDebug \
            :app:testUniversalDebugUnitTest

      - name: Verify packaged ABIs and 16 KiB alignment
        shell: bash
        run: |
          mapfile -t apks < <(
            find src-tauri/gen/android/app/build/outputs/apk \
              -type f -name '*universal*debug*.apk' -print
          )
          if (( ${#apks[@]} != 1 )); then
            printf 'Expected one universal debug APK, found %d:\n' "${#apks[@]}" >&2
            printf '  %s\n' "${apks[@]}" >&2
            exit 1
          fi
          apk="${apks[0]}"

          verification_dir="$(mktemp -d)"
          trap 'rm -rf "${verification_dir}"' EXIT
          expected_abis="${verification_dir}/expected-abis"
          actual_abis="${verification_dir}/actual-abis"
          printf '%s\n' arm64-v8a armeabi-v7a x86_64 > "${expected_abis}"
          unzip -Z1 "${apk}" |
            awk -F/ '$1 == "lib" && $3 ~ /[.]so$/ { print $2 }' |
            LC_ALL=C sort -u > "${actual_abis}"
          diff -u "${expected_abis}" "${actual_abis}"

          zipalign="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/zipalign"
          "${zipalign}" -c -P 16 -v 4 "${apk}"

          unzip -q "${apk}" 'lib/*.so' -d "${verification_dir}/apk"
          llvm_objdump="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objdump"
          library_count=0
          while IFS= read -r -d '' library; do
            library_count=$((library_count + 1))
            printf 'Checking ELF LOAD alignment: %s\n' "${library}"
            if ! "${llvm_objdump}" -p "${library}" | awk '
              $1 == "LOAD" {
                seen = 1
                split($NF, alignment, "[**]+")
                if (alignment[2] + 0 < 14) {
                  bad = 1
                }
              }
              END { exit !(seen && !bad) }
            '; then
              echo "ELF LOAD segment is not 16 KiB aligned: ${library}" >&2
              "${llvm_objdump}" -p "${library}" | awk '$1 == "LOAD"'
              exit 1
            fi
          done < <(find "${verification_dir}/apk/lib" -type f -name '*.so' -print0)

          if (( library_count == 0 )); then
            echo "APK contains no native libraries" >&2
            exit 1
          fi
