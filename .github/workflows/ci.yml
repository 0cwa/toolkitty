name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "1.96.0"

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Check Svelte and TypeScript
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --component clippy,rustfmt
          rustup default "${RUST_TOOLCHAIN}"

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Check Rust code
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features

      - name: Run Clippy
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features --no-deps -- -D warnings

      - name: Run Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --all-features
